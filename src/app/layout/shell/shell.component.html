<div class="enterprise-layout">
  <!-- Left Side Navigation -->
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon"></div>
      <span class="logo-text">ONTOFLOW</span>
    </div>

    <nav class="nav-menu">
      <div class="nav-item" routerLink="/library" routerLinkActive="active">
        <span class="material-icons-outlined">folder_open</span>
        <span>Ontology Library</span>
      </div>

      <!-- Contextual Navigation (Enabled only if an ontology is active) -->
      <div class="context-divider" *ngIf="activeJobId"></div>
      <div class="context-label" *ngIf="activeJobId">ACTIVE ONTOLOGY</div>
      <div class="active-badge" *ngIf="activeJobId">
        <span class="material-icons-outlined">cloud_done</span>
        <span class="ontology-title" [title]="activeOntologyName">{{ activeOntologyName }}</span>
      </div>

      <div class="nav-item" [routerLink]="['/ontology', activeJobId, 'visualizer']" routerLinkActive="active" *ngIf="activeJobId">
        <span class="material-icons-outlined">bubble_chart</span>
        <span>Visualizer</span>
      </div>
      <div class="nav-item" [routerLink]="['/ontology', activeJobId, 'classes']" routerLinkActive="active" *ngIf="activeJobId">
        <span class="material-icons-outlined">category</span>
        <span>Classes</span>
      </div>
      <div class="nav-item" [routerLink]="['/ontology', activeJobId, 'properties']" routerLinkActive="active" *ngIf="activeJobId">
        <span class="material-icons-outlined">list_alt</span>
        <span>Properties</span>
      </div>
      <div class="nav-item" [routerLink]="['/ontology', activeJobId, 'reasoner']" routerLinkActive="active" *ngIf="activeJobId">
        <span class="material-icons-outlined">psychology</span>
        <span>Reasoner Insights</span>
      </div>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <header class="topbar">
      <div class="search-bar">
        <span class="material-icons-outlined">search</span>
        <input type="text" placeholder="Search ontologies..." />
      </div>
      <div class="user-profile">
        <span class="material-icons-outlined">notifications</span>
        <div class="avatar"></div>
      </div>
    </header>

    <div class="content-scroll">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
